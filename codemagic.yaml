workflows:
  android-apk-from-zip:
    name: Build Android APK from ZIP
    max_build_duration: 60
    environment:
      flutter: stable

    scripts:
      - name: Find and unzip project
        script: |
          ls -la
          ZIP_FILE=$(ls *.zip | head -n 1)
          echo "ZIP file: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d extracted
          PROJECT_DIR=$(find extracted -name pubspec.yaml -exec dirname {} \; | head -n 1)
          echo "Project dir: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $CM_ENV

      - name: Prepare Flutter project
        script: |
          cd "$PROJECT_DIR"
          flutter create . --platforms=android
          flutter pub get

      - name: Apply Android patch
        script: |
          cd "$PROJECT_DIR"
          if [ -f android_patch/app/src/main/AndroidManifest.xml ]; then
            cp -f android_patch/app/src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          fi

      - name: Build APK
        script: |
          cd "$PROJECT_DIR"
          flutter build apk --release

    artifacts:
      - extracted/**/build/app/outputs/flutter-apk/app-release.apk
