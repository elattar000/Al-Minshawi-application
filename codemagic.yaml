workflows:
  android-arm64-small-apk-from-zip:
    name: Build Small Android APK - ARM64
    max_build_duration: 60
    environment:
      flutter: stable

    scripts:
      - name: Unzip Flutter project
        script: |
          set -e
          ls -la
          ZIP_FILE=$(ls *.zip | head -n 1)
          echo "ZIP file: $ZIP_FILE"
          rm -rf extracted
          unzip -o "$ZIP_FILE" -d extracted
          PROJECT_DIR=$(find extracted -name pubspec.yaml -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "pubspec.yaml not found inside ZIP"
            exit 1
          fi
          echo "Project dir: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $CM_ENV

      - name: Create Android files and install packages
        script: |
          set -e
          cd "$PROJECT_DIR"
          flutter create . --platforms=android
          flutter pub get

      - name: Configure Android package and internet permission
        script: |
          set -e
          cd "$PROJECT_DIR"
          if [ -d android_patch/app ]; then
            cp -R android_patch/app/* android/app/
          fi
          python3 - <<'PY'
          from pathlib import Path
          import re
          package = 'com.nawader.nawader_minshawi'
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          txt = manifest.read_text()
          permission = '<uses-permission android:name="android.permission.INTERNET" />'
          if permission not in txt:
              txt = txt.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + permission)
          manifest.write_text(txt)
          for gradle_name in ['android/app/build.gradle', 'android/app/build.gradle.kts']:
              p = Path(gradle_name)
              if not p.exists():
                  continue
              s = p.read_text()
              s = re.sub(r'namespace\s*=\s*"[^"]+"', f'namespace = "{package}"', s)
              s = re.sub(r'applicationId\s*=\s*"[^"]+"', f'applicationId = "{package}"', s)
              s = re.sub(r'namespace\s+"[^"]+"', f'namespace "{package}"', s)
              s = re.sub(r'applicationId\s+"[^"]+"', f'applicationId "{package}"', s)
              p.write_text(s)
          for kt in Path('android/app/src/main/kotlin').rglob('MainActivity.kt'):
              src = kt.read_text()
              src = re.sub(r'^package .+$', f'package {package}', src, flags=re.M)
              kt.write_text(src)
          PY

      - name: Generate app launcher icon
        script: |
          set -e
          cd "$PROJECT_DIR"
          dart run flutter_launcher_icons

      - name: Build small ARM64 release APK
        script: |
          set -e
          cd "$PROJECT_DIR"
          flutter build apk --release --target-platform android-arm64 --split-per-abi --obfuscate --split-debug-info=build/symbols --dart-define=OTP_API_BASE_URL=${OTP_API_BASE_URL:-https://ais-pre-xuhvgtko4beauqfeijeflu-226377500595.europe-west2.run.app} --dart-define=OTP_API_KEY=${OTP_API_KEY:-minshawi_otp_2026_secure_key}
          ls -lh build/app/outputs/flutter-apk/

    artifacts:
      - extracted/**/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
